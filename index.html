<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#3454d1" />
<link rel="manifest" href="manifest.json" />
<title>Pipeline — Job Application Tracker</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
  rel="stylesheet"
/>

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        fontFamily: {
          display: ['"Press Start 2P"', '"Space Grotesk"', "sans-serif"],
          body: ["Inter", "sans-serif"],
          mono: ['"JetBrains Mono"', "monospace"],
        },
      },
    },
  };
</script>

<style>
  /* ============================================================
     DESIGN TOKENS
     One accent (signal blue), warm-neutral paper background,
     semantic colors per pipeline stage. Swap these to re-skin
     the whole app — nothing else needs to change.
  ============================================================ */
  :root {
    --bg: #0f0f14;
    --surface: #1a1a24;
    --surface-2: #12121a;
    --border: #2a2a3a;
    --ink: #f0f0f5;
    --ink-2: #9090a0;
    --ink-3: #505060;

    --accent: #6366f1;
    --accent-bg: #6366f141;
    --accent-ink: #ffffff;

    --saved: #64748b;
    --saved-bg: #64748b20;
    --applied: #22d3ee;
    --applied-bg: #22d3ee20;
    --interviewing: #f59e0b;
    --interviewing-bg: #f59e0b20;
    --offer: #10b981;
    --offer-bg: #10b98120;
    --rejected: #ef4444;
    --rejected-bg: #ef444420;
    --ghosted: #8b5cf6;
    --ghosted-bg: #8b5cf620;

    --ring: rgba(99, 102, 241, 0.3);
  }

  .dark {
    --bg: #0f0f14;
    --surface: #1a1a24;
    --surface-2: #12121a;
    --border: #2a2a3a;
    --ink: #f0f0f5;
    --ink-2: #9090a0;
    --ink-3: #505060;

    --accent: #6366f1;
    --accent-bg: #6366f141;
    --accent-ink: #ffffff;
  }

  html:not(.dark) {
    --bg: #fafafa;
    --surface: #ffffff;
    --surface-2: #f3f4f6;
    --border: #e5e7eb;
    --ink: #111827;
    --ink-2: #6b7280;
    --ink-3: #9ca3af;

    --accent: #6366f1;
    --accent-bg: #6366f141;
    --accent-ink: #ffffff;
  }

  html, body { background: var(--bg); color: var(--ink); }
  body { font-family: '"Press Start 2P"', "Inter", sans-serif; line-height: 1.6; }

  /* 8-bit Pixel Border Utility */
  .pixel-border {
    box-shadow: 
      -4px 0 0 0 var(--border),
      4px 0 0 0 var(--border),
      0 -4px 0 0 var(--border),
      0 4px 0 0 var(--border);
    border: none !important;
  }

  .pixel-button {
    box-shadow: 
      -4px 0 0 0 var(--border),
      4px 0 0 0 var(--border),
      0 -4px 0 0 var(--border),
      0 4px 0 0 var(--border);
    border: none !important; /* Ensure no default border interferes */
    transition: all 0.1s steps(2); /* Apply pixelated transition to all changes */
  }
  .pixel-button:active {
    transform: translateY(2px); /* Simulate a button press by shifting down */
    box-shadow:
      -2px 0 0 0 var(--border), /* Reduced shadow for a "pressed" look */
      2px 0 0 0 var(--border),
      0 -2px 0 0 var(--border),
      0 2px 0 0 var(--border);
  }

  .app-card {
    transition: all 0.1s steps(2);
    background: var(--surface);
    border: 4px solid var(--border);
    border-radius: 0;
    box-shadow: 4px 4px 0 0 var(--border);
  }
  .app-card:hover {
    border-color: var(--accent);
    box-shadow: 4px 4px 0 0 var(--accent);
    transform: translate(-2px, -2px);
  }

  .app-label {
    display: block;
    font-size: 0.65rem;
    font-family: '"Press Start 2P"', cursive;
    margin-bottom: 0.4rem;
    color: var(--ink-2);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .col-dropzone {
    background: var(--accent-bg) !important;
    border: 4px dashed var(--accent) !important;
  }

  .app-input {
    width: 100%;
    height: 2.5rem;
    border-radius: 0;
    border: 4px solid var(--border);
    background: var(--surface-2);
    color: var(--ink);
    padding: 0 0.75rem;
    font-size: 0.75rem;
    font-family: '"JetBrains Mono"', monospace;
    transition: all 0.1s steps(2);
  }
  .app-input:focus { outline: none; box-shadow: 0 0 0 4px var(--accent); border-color: var(--accent); background: var(--surface); }
  textarea.app-input { height: auto; padding: 0.6rem 0.75rem; resize: vertical; }

  #board-view {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 1.5rem;
    width: 100%;
    box-sizing: border-box;
    padding: 1rem;
    align-items: start;
    overflow-x: auto;
  }
  #board-view > * {
    min-width: 0 !important;
    overflow: hidden;
    border: 4px solid var(--border);
    border-radius: 0;
    box-shadow: 4px 4px 0 0 var(--border);
  }

  @media (prefers-reduced-motion: reduce) {
    * {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
      scroll-behavior: auto !important;
    }
  }
</style>
<base target="_blank">
</head>
<body class="font-body min-h-dvh">

<!-- ================= HEADER ================= -->
<header class="sticky top-0 z-30 border-b" style="background: var(--bg); border-color: var(--border);">
  <div class="max-w-7xl mx-auto px-4 sm:px-6">
    <div class="flex flex-wrap items-center gap-3 py-3">

      <!-- Logo -->
      <div class="flex items-center gap-2 mr-2">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M3 12h4l3 7 4-14 3 7h4" stroke="var(--accent)" stroke-width="3" stroke-linecap="square"/>
        </svg>
        <span class="font-display font-semibold text-lg tracking-tight uppercase">Pipeline</span>
      </div>

      <!-- Search -->
      <div class="relative flex-1 min-w-[140px] max-w-xs">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2" width="15" height="15" viewBox="0 0 24 24" fill="none">
          <circle cx="11" cy="11" r="7" stroke="var(--ink-3)" stroke-width="2"/>
          <path d="M21 21l-3.8-3.8" stroke="var(--ink-3)" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input id="search-input" type="text" placeholder="Search company or role" class="app-input pl-9" />
      </div>

      <!-- View toggle -->
      <div class="inline-flex items-center p-1 gap-1" style="background: var(--surface-2); border:4px solid var(--border);">
        <button id="view-board-btn" onclick="setView('board')" class="pixel-button h-8 px-3 rounded-none text-[10px] font-medium transition uppercase">Board</button>
        <button id="view-table-btn" onclick="setView('table')" class="pixel-button h-8 px-3 rounded-none text-[10px] font-medium transition uppercase">Table</button>
      </div>

      <!-- Export / Import -->
      <button onclick="exportData()" title="Download your data as a JSON file" class="pixel-button h-9 px-3 rounded-none text-[10px] font-medium inline-flex items-center gap-1.5 uppercase" style="border-color: var(--border); color: var(--ink-2);">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 21h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="hidden sm:inline">Export</span>
      </button>
      <label title="Restore data from a previously exported JSON file" class="pixel-button h-9 px-3 rounded-none text-[10px] font-medium inline-flex items-center gap-1.5 cursor-pointer uppercase" style="border-color: var(--border); color: var(--ink-2);">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 21V9m0 0l-4 4m4-4l4 4M4 3h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="hidden sm:inline">Import</span>
        <input type="file" accept="application/json" class="hidden" onchange="importData(event)" />
      </label>

      <!-- Theme toggle -->
      <button id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode" class="pixel-button h-9 w-9 rounded-none flex items-center justify-center" style="border-color: var(--border); color: var(--ink-2);">
        <svg id="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <svg id="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" class="hidden"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
      </button>

      <!-- Add application -->
      <button onclick="openDrawer()" class="pixel-button h-9 px-4 rounded-none text-[10px] font-medium inline-flex items-center gap-1.5 uppercase" style="background: var(--accent); color: var(--accent-ink);">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        Add application
      </button>
    </div>
  </div>
</header>

<!-- ================= STATS / PIPELINE STRIP (signature element) ================= -->
<section class="border-b" style="border-color: var(--border);">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 py-5">
    <div class="flex flex-wrap items-end gap-x-8 gap-y-3 mb-4">
      <div class="pixel-border p-2 bg-[var(--surface)]">
        <div class="text-2xl font-display font-bold" id="stat-total">0</div>
        <div class="text-[10px] font-medium uppercase tracking-wider" style="color: var(--ink-3);">Total</div>
      </div>
      <div class="pixel-border p-2 bg-[var(--surface)]">
        <div class="text-2xl font-display font-bold" id="stat-active">0</div>
        <div class="text-[10px] font-medium uppercase tracking-wider" style="color: var(--ink-3);">Active</div>
      </div>
      <div class="pixel-border p-2 bg-[var(--surface)]" title="Interviews + offers ÷ applications sent">
        <div class="text-2xl font-display font-bold" id="stat-response">0%</div>
        <div class="text-[10px] font-medium uppercase tracking-wider" style="color: var(--ink-3);">Response</div>
      </div>
      <div class="pixel-border p-2 bg-[var(--surface)]">
        <div class="text-2xl font-display font-bold" id="stat-offers">0</div>
        <div class="text-[10px] font-medium uppercase tracking-wider" style="color: var(--ink-3);">Offers</div>
      </div>
    </div>

    <div class="flex h-2 rounded-full overflow-hidden w-full" style="background: var(--surface-2);" id="pipeline-bar"></div>
    <div class="flex flex-wrap gap-x-5 gap-y-1 mt-2 text-xs" id="pipeline-legend" style="color: var(--ink-2);"></div>
  </div>
</section>

<!-- ================= MAIN ================= -->
<main class="w-full px-1 py-4">

  <!-- Board view -->
  <div id="board-view" class="w-full"></div>

  <!-- Table view -->
  <div id="table-view" class="hidden overflow-x-auto rounded-lg border" style="border-color: var(--border);">
    <table class="w-full text-sm">
      <thead>
        <tr style="background: var(--surface-2);">
          <th class="text-left font-medium px-4 py-2.5 cursor-pointer select-none" style="color: var(--ink-2);" onclick="setSort('company')">Company<span id="sort-company"></span></th>
          <th class="text-left font-medium px-4 py-2.5 cursor-pointer select-none" style="color: var(--ink-2);" onclick="setSort('role')">Role<span id="sort-role"></span></th>
          <th class="text-left font-medium px-4 py-2.5 cursor-pointer select-none" style="color: var(--ink-2);" onclick="setSort('stage')">Stage<span id="sort-stage"></span></th>
          <th class="text-left font-medium px-4 py-2.5 cursor-pointer select-none" style="color: var(--ink-2);" onclick="setSort('dateApplied')">Applied<span id="sort-dateApplied"></span></th>
          <th class="text-left font-medium px-4 py-2.5 cursor-pointer select-none" style="color: var(--ink-2);" onclick="setSort('lastUpdate')">Last update<span id="sort-lastUpdate"></span></th>
          <th class="text-left font-medium px-4 py-2.5" style="color: var(--ink-2);">Location</th>
          <th class="px-4 py-2.5"></th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>

  <!-- Empty state -->
  <div id="empty-state" class="hidden flex-col items-center justify-center text-center py-20">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" class="mb-3">
      <path d="M3 12h4l3 7 4-14 3 7h4" stroke="var(--ink-3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <p class="font-medium" id="empty-title">No applications yet</p>
    <p class="text-sm mt-1 mb-4" style="color: var(--ink-2);" id="empty-subtitle">Add the first one to start tracking your pipeline.</p>
    <button onclick="openDrawer()" class="h-9 px-4 rounded-lg text-sm font-medium" style="background: var(--accent); color: var(--accent-ink);">Add your first application</button>
  </div>
</main>

<!-- ================= LOADER OVERLAY ================= -->
<div id="loader-overlay" class="loader-overlay hidden">
  <div class="pixel-loader"></div>
  <p class="font-display text-[10px] text-white animate-pulse">Processing...</p>
</div>

<!-- ================= DRAWER ================= -->
<div id="drawer-backdrop" onclick="closeDrawer()" class="fixed inset-0 z-40 hidden" style="background: rgba(0,0,0,0.4);"></div>
<aside id="drawer" role="dialog" aria-modal="true" aria-labelledby="drawer-title"
  class="fixed top-0 right-0 h-full w-full sm:w-[420px] z-50 translate-x-full transition-transform duration-300 overflow-y-auto"
  style="background: var(--surface); border-left: 1px solid var(--border);">
  <form id="app-form" class="flex flex-col h-full" onsubmit="saveForm(event)">
    <div class="flex items-center justify-between px-5 py-4 border-b" style="border-color: var(--border);">
      <h2 id="drawer-title" class="font-display font-semibold text-base">Add application</h2>
      <button type="button" onclick="closeDrawer()" aria-label="Close" class="h-8 w-8 rounded-md flex items-center justify-center" style="color: var(--ink-2);">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>

    <div class="flex-1 px-5 py-5 space-y-4">
      <input type="hidden" id="f-id" />

      <div>
        <label class="app-label" for="f-company">Company</label>
        <input id="f-company" class="app-input" required placeholder="e.g. Northwind Logistics" />
      </div>
      <div>
        <label class="app-label" for="f-role">Role</label>
        <input id="f-role" class="app-input" required placeholder="e.g. Product Designer" />
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="app-label" for="f-stage">Stage</label>
          <select id="f-stage" class="app-input"></select>
        </div>
        <div>
          <label class="app-label" for="f-date">Date applied</label>
          <input id="f-date" type="date" class="app-input" />
        </div>
      </div>
      <div>
        <label class="app-label" for="f-location">Location</label>
        <input id="f-location" class="app-input" placeholder="e.g. Remote, or Austin, TX" />
      </div>
      <div>
        <label class="app-label" for="f-url">Job posting URL</label>
        <div class="flex gap-2">
          <input id="f-url" type="url" class="app-input flex-1" placeholder="https://" oninput="updateVisitBtn(this.value)" />
          <a id="f-url-visit-btn" href="#" target="_blank" class="h-9 px-3 rounded-lg text-sm font-medium inline-flex items-center gap-1.5 border hidden" style="border-color: var(--border); color: var(--ink-2);" title="Visit Job Posting">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-6M15 3h6v6M10 14L21 3"/></svg>
            Visit
          </a>
        </div>
      </div>
      <div>
        <label class="app-label" for="f-notes">Notes</label>
        <textarea id="f-notes" rows="4" class="app-input" placeholder="Contact, salary range, interview prep…"></textarea>
      </div>
    </div>

    <div class="flex items-center justify-between px-5 py-4 border-t" style="border-color: var(--border);">
      <button type="button" id="delete-btn" onclick="deleteCurrent()" class="text-sm font-medium hidden" style="color: var(--rejected);">Delete</button>
      <div class="flex gap-2 ml-auto">
        <button type="button" onclick="closeDrawer()" class="h-9 px-4 rounded-lg text-sm font-medium border" style="border-color: var(--border); color: var(--ink-2);">Cancel</button>
        <button type="submit" class="h-9 px-4 rounded-lg text-sm font-medium" style="background: var(--accent); color: var(--accent-ink);">Save</button>
      </div>
    </div>
  </form>
</aside>

<script>
/* ============================================================
   STATE
   Persistence enabled via localStorage.
============================================================ */
const STAGES = [
  { key: "saved",         label: "Saved",         color: "var(--saved)",         bg: "var(--saved-bg)" },
  { key: "applied",       label: "Applied",       color: "var(--applied)",       bg: "var(--applied-bg)" },
  { key: "interviewing",  label: "Interviewing",  color: "var(--interviewing)",  bg: "var(--interviewing-bg)" },
  { key: "offer",         label: "Offer",         color: "var(--offer)",         bg: "var(--offer-bg)" },
  { key: "rejected",      label: "Rejected",      color: "var(--rejected)",      bg: "var(--rejected-bg)" },
  { key: "ghosted",       label: "Ghosted",       color: "var(--ghosted)",       bg: "var(--ghosted-bg)" },
];

let applications = JSON.parse(localStorage.getItem('pipeline_apps')) || [];

let currentView = "board";
let sortField = "lastUpdate";
let sortDir = "desc";
let justDragged = false;

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

function escapeHtml(str) {
  if (!str) return "";
  return str.replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function formatDate(iso) {
  if (!iso) return "—";
  const d = new Date(iso + "T00:00:00");
  if (isNaN(d)) return "—";
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
}

function stageInfo(key) { return STAGES.find((s) => s.key === key) || STAGES[0]; }

function todayIso() {
  const d = new Date();
  return d.toISOString().slice(0, 10);
}

/* ============================================================
   THEME
============================================================ */
function applyTheme(isDark) {
  document.documentElement.classList.toggle("dark", isDark);
  document.getElementById("icon-sun").classList.toggle("hidden", !isDark);
  document.getElementById("icon-moon").classList.toggle("hidden", isDark);
  localStorage.setItem("pipeline_theme", isDark ? "dark" : "light");
}
function toggleTheme() {
  applyTheme(!document.documentElement.classList.contains("dark"));
}
const savedTheme = localStorage.getItem("pipeline_theme");
const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
applyTheme(savedTheme ? savedTheme === "dark" : prefersDark);

/* ============================================================
   VIEW TOGGLE
============================================================ */
function setView(view) {
  currentView = view;
  document.getElementById("board-view").classList.toggle("hidden", view !== "board");
  document.getElementById("table-view").classList.toggle("hidden", view !== "table");

  const boardBtn = document.getElementById("view-board-btn");
  const tableBtn = document.getElementById("view-table-btn");
  const active = "background: var(--surface); color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,0.04);";
  const inactive = "background: transparent; color: var(--ink-2);";
  boardBtn.style = view === "board" ? active : inactive;
  tableBtn.style = view === "table" ? active : inactive;
  renderAll();
}

/* ============================================================
   STATS + PIPELINE STRIP
============================================================ */
function renderStats() {
  const total = applications.length;
  const byStage = {};
  STAGES.forEach((s) => (byStage[s.key] = applications.filter((a) => a.stage === s.key).length));

  const active = byStage.saved + byStage.applied + byStage.interviewing;
  const submitted = total - byStage.saved;
  const responded = byStage.interviewing + byStage.offer;
  const responseRate = submitted > 0 ? Math.round((responded / submitted) * 100) : 0;

  document.getElementById("stat-total").textContent = total;
  document.getElementById("stat-active").textContent = active;
  document.getElementById("stat-response").textContent = responseRate + "%";
  document.getElementById("stat-offers").textContent = byStage.offer;

  const bar = document.getElementById("pipeline-bar");
  const legend = document.getElementById("pipeline-legend");
  if (total === 0) {
    bar.innerHTML = "";
    legend.innerHTML = "";
    return;
  }
  bar.innerHTML = STAGES.map((s) => {
    const pct = (byStage[s.key] / total) * 100;
    if (pct === 0) return "";
    return `<div style="width:${pct}%; background:${s.color};" title="${s.label}: ${byStage[s.key]}"></div>`;
  }).join("");
  legend.innerHTML = STAGES.map(
    (s) => `<span class="inline-flex items-center gap-1.5">
        <span class="w-1.5 h-1.5 rounded-full" style="background:${s.color}"></span>
        ${s.label} <span class="tabular">${byStage[s.key]}</span>
      </span>`
  ).join("");
}

/* ============================================================
   FILTER
============================================================ */
function filtered() {
  const q = document.getElementById("search-input").value.trim().toLowerCase();
  if (!q) return applications;
  return applications.filter(
    (a) => a.company.toLowerCase().includes(q) || a.role.toLowerCase().includes(q)
  );
}

/* ============================================================
   BOARD VIEW
============================================================ */
function renderBoard() {
  const list = filtered();
  const board = document.getElementById("board-view");
  board.innerHTML = STAGES.map((stage) => {
    const items = list.filter((a) => a.stage === stage.key);
    return `
    <div class="flex flex-col min-w-0 rounded-xl p-3" data-column="${stage.key}" style="background: var(--surface-2); border: 1px solid var(--border);">
        <div class="flex items-center justify-between mb-3">
          <h3 class="text-xs font-bold uppercase tracking-widest" style="color: ${stage.color};">${stage.label}</h3>
          <span class="text-[10px] font-bold px-2 py-0.5 rounded-full" style="background: ${stage.bg}; color: ${stage.color};">${items.length}</span>
        </div>
        <div class="flex flex-col gap-2 min-h-[100px]">
          ${items.map(cardHtml).join("")}
        </div>
        <button onclick="openDrawer(null, '${stage.key}')" class="mt-3 py-2 rounded-lg text-[11px] font-medium border border-dashed transition-all flex items-center justify-center gap-1 hover:border-solid" style="border-color: var(--border); color: var(--ink-3);">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          Add
        </button>
      </div>`;
  }).join("");
}

function cardHtml(a) {
  const s = stageInfo(a.stage);
  return `
    <div class="app-card rounded-lg p-3 cursor-grab active:cursor-grabbing group" draggable="true" data-id="${a.id}" style="border-left: 3px solid ${s.color};">
      <div class="flex justify-between items-start gap-1">
        <div class="font-bold text-[13px] leading-snug truncate flex-1">${escapeHtml(a.company)}</div>
        ${a.url ? `
          <a href="${a.url}" target="_blank" onclick="event.stopPropagation()" class="opacity-0 group-hover:opacity-100 transition-opacity" style="color: var(--accent);">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-6M15 3h6v6M10 14L21 3"/></svg>
          </a>
        ` : ''}
      </div>
      <div class="text-[12px] font-medium mt-0.5 truncate" style="color: var(--ink-2);">${escapeHtml(a.role)}</div>
      <div class="flex items-center gap-2 mt-3 text-[10px] font-medium uppercase tracking-tighter" style="color: var(--ink-3);">
        <svg width="8" height="8" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="16" rx="2" stroke="currentColor" stroke-width="2"/><path d="M3 9h18M8 3v4M16 3v4" stroke="currentColor" stroke-width="2"/></svg>
        ${formatDate(a.dateApplied)}
        ${a.location ? `<span>·</span><span class="truncate">${escapeHtml(a.location)}</span>` : ""}
      </div>
    </div>`;
}

// Drag and drop — delegated on the board container so it survives re-renders
const boardEl = document.getElementById("board-view");
boardEl.addEventListener("dragstart", (e) => {
  const card = e.target.closest(".app-card");
    if (e.target.tagName === 'A' && e.target.closest('.app-card')) {
      return; // Prevent dragging when clicking the link
    }
  if (!card) return;
  e.dataTransfer.setData("text/plain", card.dataset.id);
  e.dataTransfer.effectAllowed = "move";
});
boardEl.addEventListener("dragover", (e) => {
  const col = e.target.closest("[data-column]");
  if (!col) return;
  e.preventDefault();
  document.querySelectorAll("[data-column]").forEach((c) => c.classList.remove("col-dropzone"));
  col.classList.add("col-dropzone");
});
boardEl.addEventListener("dragleave", (e) => {
  const col = e.target.closest("[data-column]");
  if (col) col.classList.remove("col-dropzone");
});
boardEl.addEventListener("drop", (e) => {
  const col = e.target.closest("[data-column]");
  if (!col) return;
  e.preventDefault();
  const id = e.dataTransfer.getData("text/plain");
  const app = applications.find((a) => a.id === id);
  if (app && app.stage !== col.dataset.column) {
    app.stage = col.dataset.column;
    app.lastUpdate = todayIso();
    justDragged = true;
    setTimeout(() => (justDragged = false), 50);
  }
  renderAll();
});
boardEl.addEventListener("click", (e) => {
  if (justDragged) return;
  const card = e.target.closest(".app-card");
  if (card) openDrawer(card.dataset.id);
});



/* ============================================================
   TABLE VIEW
============================================================ */
function setSort(field) {
  if (sortField === field) sortDir = sortDir === "asc" ? "desc" : "asc";
  else { sortField = field; sortDir = "asc"; }
  renderTable();
}

function renderTable() {
  ["company", "role", "stage", "dateApplied", "lastUpdate"].forEach((f) => {
    document.getElementById("sort-" + f).textContent = sortField === f ? (sortDir === "asc" ? " ▲" : " ▼") : "";
  });

  const list = [...filtered()].sort((a, b) => {
    let av = a[sortField], bv = b[sortField];
    if (sortField === "stage") {
      av = STAGES.findIndex((s) => s.key === a.stage);
      bv = STAGES.findIndex((s) => s.key === b.stage);
    }
    if (av < bv) return sortDir === "asc" ? -1 : 1;
    if (av > bv) return sortDir === "asc" ? 1 : -1;
    return 0;
  });

  document.getElementById("table-body").innerHTML = list.map((a) => {
    const s = stageInfo(a.stage);
    return `
      <tr class="border-t cursor-pointer hover:bg-[var(--surface-2)]" style="border-color:var(--border);" onclick="openDrawer('${a.id}')">
        <td class="px-4 py-2.5 font-medium">${escapeHtml(a.company)}</td>
        <td class="px-4 py-2.5" style="color:var(--ink-2);">${escapeHtml(a.role)}</td>
        <td class="px-4 py-2.5">
          <span class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-xs font-medium" style="color:${s.color}; background:${s.bg};">
            <span class="w-1.5 h-1.5 rounded-full" style="background:${s.color}"></span>${s.label}
          </span>
        </td>
        <td class="px-4 py-2.5 tabular" style="color:var(--ink-2);">${formatDate(a.dateApplied)}</td>
        <td class="px-4 py-2.5 tabular" style="color:var(--ink-2);">${formatDate(a.lastUpdate)}</td>
        <td class="px-4 py-2.5" style="color:var(--ink-2);">${escapeHtml(a.location) || "—"}</td>
        <td class="px-4 py-2.5 text-right">
          <div class="flex items-center justify-end gap-2">
            ${a.url ? `
              <a href="${a.url}" target="_blank" class="h-8 w-8 inline-flex items-center justify-center rounded-md hover:bg-[var(--surface-2)]" style="color:var(--accent);" title="Visit Posting">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-6M15 3h6v6M10 14L21 3"/></svg>
              </a>
            ` : ''}
            <button onclick="event.stopPropagation(); quickDelete('${a.id}')" aria-label="Delete ${escapeHtml(a.company)}" class="h-8 w-8 inline-flex items-center justify-center rounded-md" style="color:var(--ink-3);">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M4 7h16M9 7V5a1 1 0 011-1h4a1 1 0 011 1v2m2 0l-1 13a2 2 0 01-2 2H8a2 2 0 01-2-2L5 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
        </td>
      </tr>`;
  }).join("");
}

function quickDelete(id) {
  if (!confirm("Delete this application? This can't be undone.")) return;
  applications = applications.filter((a) => a.id !== id);
  localStorage.setItem('pipeline_apps', JSON.stringify(applications));
  renderAll();
}

/* ============================================================
   EMPTY STATE
============================================================ */
function renderEmptyState() {
  const list = filtered();
  const empty = document.getElementById("empty-state");
  const board = document.getElementById("board-view");
  const table = document.getElementById("table-view");

  if (applications.length === 0) {
    empty.classList.remove("hidden");
    empty.classList.add("flex");
    document.getElementById("empty-title").textContent = "No applications yet";
    document.getElementById("empty-subtitle").textContent = "Add the first one to start tracking your pipeline.";
    board.classList.add("hidden");
    table.classList.add("hidden");
  } else if (list.length === 0) {
    empty.classList.remove("hidden");
    empty.classList.add("flex");
    document.getElementById("empty-title").textContent = "No matches";
    document.getElementById("empty-subtitle").textContent = "Try a different search term.";
    board.classList.add("hidden");
    table.classList.add("hidden");
  } else {
    empty.classList.add("hidden");
    empty.classList.remove("flex");
    board.classList.toggle("hidden", currentView !== "board");
    table.classList.toggle("hidden", currentView !== "table");
  }
}

/* ============================================================
   RENDER DISPATCH
============================================================ */
function renderAll() {
  renderStats();
  renderEmptyState();
  if (currentView === "board") renderBoard();
  else renderTable();
}
document.getElementById("search-input").addEventListener("input", renderAll);

/* ============================================================
   DRAWER (add / edit)
============================================================ */
let editingId = null;

function populateStageOptions() {
  const select = document.getElementById("f-stage");
  select.innerHTML = STAGES.map((s) => `<option value="${s.key}">${s.label}</option>`).join("");
}
populateStageOptions();

function updateVisitBtn(val) {
  const btn = document.getElementById("f-url-visit-btn");
  if (val && (val.startsWith('http') || val.includes('.'))) {
    btn.href = val.startsWith('http') ? val : `https://${val}`;
    btn.classList.remove("hidden");
  } else {
    btn.classList.add("hidden");
  }
}

function openDrawer(id = null, presetStage = null) {
  editingId = id;
  const form = document.getElementById("app-form");
  form.reset();
  document.getElementById("delete-btn").classList.toggle("hidden", !id);

  const urlInput = document.getElementById("f-url");
  const urlVisitBtn = document.getElementById("f-url-visit-btn");

  if (id) {
    const a = applications.find((x) => x.id === id);
    document.getElementById("drawer-title").textContent = "Edit application";
    document.getElementById("f-company").value = a.company;
    document.getElementById("f-role").value = a.role;
    document.getElementById("f-stage").value = a.stage;
    document.getElementById("f-date").value = a.dateApplied;
    document.getElementById("f-location").value = a.location;
    urlInput.value = a.url || "";
    document.getElementById("f-notes").value = a.notes || "";

    updateVisitBtn(a.url);
  } else {
    document.getElementById("drawer-title").textContent = "Add application";
    document.getElementById("f-stage").value = presetStage || "applied";
    document.getElementById("f-date").value = todayIso();
    urlVisitBtn.classList.add("hidden"); // Hide button for new applications
  }

  document.getElementById("drawer-backdrop").classList.remove("hidden");
  document.getElementById("drawer").classList.remove("translate-x-full");
  setTimeout(() => document.getElementById("f-company").focus(), 50);
}

function closeDrawer() {
  document.getElementById("drawer").classList.add("translate-x-full");
  document.getElementById("drawer-backdrop").classList.add("hidden");
  editingId = null;
}

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeDrawer();
});

function saveForm(e) {
  e.preventDefault();
  const data = {
    company: document.getElementById("f-company").value.trim(),
    role: document.getElementById("f-role").value.trim(),
    stage: document.getElementById("f-stage").value,
    dateApplied: document.getElementById("f-date").value || todayIso(),
    location: document.getElementById("f-location").value.trim(),
    url: document.getElementById("f-url").value.trim(),
    notes: document.getElementById("f-notes").value.trim(),
  };

  if (editingId) {
    const a = applications.find((x) => x.id === editingId);
    Object.assign(a, data);
    a.lastUpdate = todayIso();
  } else {
    applications.push({ id: uid(), ...data, lastUpdate: todayIso() });
  }
  
  localStorage.setItem('pipeline_apps', JSON.stringify(applications));
  closeDrawer();
  renderAll();
}

function deleteCurrent() {
  if (!editingId) return;
  if (!confirm("Delete this application? This can't be undone.")) return;
  applications = applications.filter((a) => a.id !== editingId);
  closeDrawer();
  renderAll();
}

/* ============================================================
   EXPORT / IMPORT (stand-in for persistence)
============================================================ */
function exportData() {
  const blob = new Blob([JSON.stringify(applications, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = "pipeline-applications.json";
  link.click();
  URL.revokeObjectURL(url);
}

function toggleLoader(show) {
  const loader = document.getElementById("loader-overlay");
  if (show) loader.classList.remove("hidden");
  else loader.classList.add("hidden");
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  toggleLoader(true);
  
  const reader = new FileReader();
  reader.onload = () => {
    // Simulate a slight delay for visual feedback
    setTimeout(() => {
    try {
      const data = JSON.parse(reader.result);
      if (!Array.isArray(data)) throw new Error("Invalid format");
      applications = data;
      localStorage.setItem('pipeline_apps', JSON.stringify(applications));
      renderAll();
    } catch (err) {
      alert("That file couldn't be read as a Pipeline export. Make sure it's an unedited JSON file from Export.");
    }
    finally {
        toggleLoader(false);
      }} , 800);
  };
  reader.readAsText(file);
  event.target.value = "";
}

/* ============================================================
   INIT
============================================================ */
setView("board");

  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('Service Worker registered'))
      .catch(err => console.log('Service Worker registration failed', err));
  });
}
